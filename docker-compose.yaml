name: firecrawl

# This compose file only runs cloudflared tunnel.
# The actual Firecrawl services (api, redis, rabbitmq, playwright, postgres)
# are managed by the jktank-crawler compose project.

services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
    command: tunnel run
    networks:
      - jktank
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
        compress: "true"

networks:
  jktank:
    name: jktank-crawler_backend
    external: true
